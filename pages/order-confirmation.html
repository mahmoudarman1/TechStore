<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechStore | Order Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body>
    <main class="py-5 bg-light">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8">
            <div class="card shadow-sm border-0">
              <div class="card-body p-5 text-center">
                <div class="alert alert-success" role="alert">
                  <strong>Order confirmed!</strong> Your payment was successful.
                </div>
                <h1 class="fw-bold mb-3">Thank you for your order!</h1>
                <p class="text-muted">A confirmation email has been sent to your inbox with your receipt and tracking details.</p>
                <div class="card text-start mt-4">
                  <div class="card-body">
                    <h5 class="card-title">Order Summary</h5>
                    <div class="d-flex justify-content-between"><span>Order Number</span><span>#TS-2048</span></div>
                    <div class="d-flex justify-content-between"><span>Items</span><span>2</span></div>
                    <div class="d-flex justify-content-between"><span>Total</span><span>$1,799</span></div>
                  </div>
                </div>
                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-4">
                  <a href="shop.html" class="btn btn-dark">Continue Shopping</a>
                  <a href="index.html" class="btn btn-outline-dark">Return to Home</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
